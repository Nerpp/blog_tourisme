services:
  php:
    image: blog_tourisme-php
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: development
    container_name: blog_tourisme_php
    env_file:
      - .env.docker
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - blog_tourisme

  web:
    image: nginx:1.27-alpine
    container_name: blog_tourisme_web
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - blog_tourisme

  php_lighthouse:
    image: blog_tourisme-php
    profiles:
      - tools
    env_file:
      - .env.lighthouse
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - blog_tourisme

  web_lighthouse:
    image: nginx:1.27-alpine
    profiles:
      - tools
    ports:
      - "8082:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/lighthouse.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php_lighthouse
    networks:
      - blog_tourisme

  mysql:
    image: mysql:8.0
    container_name: blog_tourisme_mysql
    environment:
      MYSQL_DATABASE: blog_tourisme
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uapp", "-papp"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - blog_tourisme

  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: blog_tourisme_phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: app
      PMA_PASSWORD: app
      UPLOAD_LIMIT: 64M
    ports:
      - "8081:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - blog_tourisme

  mailpit:
    image: axllent/mailpit:latest
    container_name: blog_tourisme_mailpit
    ports:
      - "8025:8025"
    networks:
      - blog_tourisme

  node:
    image: node:24-alpine
    container_name: blog_tourisme_node
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    working_dir: /var/www/html
    command: sh -c "npm ci && npm run build"
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www/html
    networks:
      - blog_tourisme

  lighthouse:
    image: blog-tourisme-lighthouse:local
    build:
      context: .
      dockerfile: docker/lighthouse/Dockerfile
    profiles:
      - tools
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    working_dir: /workspace
    environment:
      CHROME_PATH: /usr/bin/chromium
      HOME: /tmp/lighthouse-home
      LIGHTHOUSE_AUDIT_BASE_URL: http://web_lighthouse
      XDG_CACHE_HOME: /tmp/lighthouse-cache
      XDG_CONFIG_HOME: /tmp/lighthouse-config
    volumes:
      - ./:/workspace
    depends_on:
      - web_lighthouse
    networks:
      - blog_tourisme

networks:
  blog_tourisme:
    driver: bridge

volumes:
  mysql_data:
