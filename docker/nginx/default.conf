server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    client_max_body_size 70m;

    location ^~ /build/assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~* ^/uploads/media/variants/.+\.webp$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ^~ /uploads/avatars/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=2592000";
    }

    location ^~ /images/brand/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400";
    }

    location ^~ /images/favicon/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400";
    }

    location ^~ /images/icons/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400";
    }

    location = /images/home/hero-sea-mountain-desktop.webp {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400";
    }

    location = /images/home/hero-sea-mountain-mobile.webp {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400";
    }

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
