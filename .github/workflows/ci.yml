name: CI

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Enforce dev as the only promotion source
        if: github.event_name == 'pull_request' && github.base_ref == 'main'
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: test "$HEAD_BRANCH" = "dev"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Configure Docker user
        run: |
          {
            echo "DOCKER_UID=$(id -u)"
            echo "DOCKER_GID=$(id -g)"
            echo "COMPOSE_FILE=docker-compose.yml:.github/compose.ci.yml"
          } >> "$GITHUB_ENV"

      - name: Start MySQL
        run: docker compose up -d --wait mysql

      - name: Install Composer dependencies
        run: |
          docker compose build php
          docker compose run --rm -e SKIP_COMPOSER_INSTALL=1 php composer install --no-interaction --prefer-dist --no-progress

      - name: Verify isolated production build
        run: docker compose run --rm -e SKIP_COMPOSER_INSTALL=1 php sh scripts/check-production-build.sh

      - name: Start PHP and Mailpit
        run: docker compose up -d --wait php mailpit

      - name: Install npm dependencies
        run: |
          docker compose run --rm --user root node chown -R "${DOCKER_UID}:${DOCKER_GID}" /var/www/html/node_modules
          docker compose run --rm node npm ci

      - name: Build Vite assets
        run: make node-build

      - name: Diagnose Panther browser
        run: |
          docker compose exec -T php sh -lc 'set -eu; id; pwd; umask; env | sort | grep -E "^(PANTHER|HOME|XDG_|TMP|CI=)" || true'
          docker compose exec -T php sh -lc 'set -eu; test -x "$PANTHER_CHROME_BINARY"; printf "%s\n" "$PANTHER_CHROME_BINARY"'
          docker compose exec -T php sh -lc 'set -eu; command -v chromedriver; test "$(command -v chromedriver)" = /usr/local/bin/chromedriver'
          docker compose exec -T php sh -lc 'set -eu; "$PANTHER_CHROME_BINARY" --version'
          docker compose exec -T php sh -lc 'set -eu; chromedriver --version'
          docker compose exec -T php sh -lc 'set -eu; ls -ld /tmp "$HOME" "${XDG_CACHE_HOME:-/missing}" "${XDG_CONFIG_HOME:-/missing}" 2>/dev/null || true'
          docker compose exec -T php sh -lc 'set -eu; df -h /dev/shm /tmp || true'
          docker compose exec -T php sh -lc 'set -eu; find /tmp -maxdepth 2 \( -type d -name "panther*" -o -name "chrome*" \) 2>/dev/null | head -100 || true'

      - name: Check Chromium directories
        run: |
          docker compose exec -T php sh -lc '
            set -eux

            echo "--- Identité du processus ---"
            id
            getent passwd "$(id -u)" || true

            runtime_home="$(getent passwd "$(id -u)" | cut -d: -f6 || true)"
            echo "HOME env: ${HOME:-<absent>}"
            echo "Home passwd: ${runtime_home:-<inconnu>}"

            echo "--- Répertoires Chromium temporaires ---"
            rm -rf /tmp/panther-profile
            install -d -m 700 \
              "$HOME" \
              "$XDG_CONFIG_HOME" \
              "$XDG_CACHE_HOME" \
              "$XDG_DATA_HOME" \
              "$XDG_RUNTIME_DIR" \
              /tmp/panther-profile

            for directory in \
              "$HOME" \
              "$XDG_CONFIG_HOME" \
              "$XDG_CACHE_HOME" \
              "$XDG_DATA_HOME" \
              "$XDG_RUNTIME_DIR" \
              /tmp/panther-profile
            do
              ls -ld "$directory"
              touch "$directory/.write-check"
              rm "$directory/.write-check"
            done

            echo "--- Répertoire personnel système ---"
            if [ -n "$runtime_home" ]; then
              ls -ld "$runtime_home" || true
              test -w "$runtime_home" && echo "Le home système est accessible en écriture." || echo "Le home système n est pas accessible en écriture."
            fi

            echo "--- Limites conteneur ---"
            df -h /tmp /dev/shm || true
            cat /sys/fs/cgroup/memory.events 2>/dev/null || true
            cat /sys/fs/cgroup/pids.current 2>/dev/null || true
            cat /sys/fs/cgroup/pids.max 2>/dev/null || true
          '

      - name: Launch Chromium directly
        run: |
          docker compose exec -T php bash -lc '
            set -u

            /opt/chrome-for-testing/chrome-headless-shell-linux64/chrome-headless-shell \
              --headless=new \
              --no-sandbox \
              --disable-dev-shm-usage \
              --disable-gpu \
              --no-first-run \
              --no-default-browser-check \
              --user-data-dir=/tmp/panther-profile \
              --dump-dom about:blank \
              2>&1 | tee /tmp/panther-chromium-direct.log

            chromium_status=${PIPESTATUS[0]}
            echo "Chromium direct exit code: ${chromium_status}"

            exit "${chromium_status}"
          '

      - name: Diagnose Symfony login route
        run: |
          docker compose exec -T php sh -lc 'php bin/console debug:router | grep -E "login|logout" || true'
          docker compose exec -T php php bin/console about --env=test
          docker compose exec -T php sh -lc 'find var/log -maxdepth 2 -type f -print 2>/dev/null || true'

      - name: Verify Vite manifest
        run: |
          docker compose exec -T php test -f public/build/manifest.json
          docker compose exec -T php ls -lh public/build/manifest.json

      - name: Run Panther smoke test
        run: |
          make test-db-reset
          docker compose exec -T \
            -e SKIP_TEST_DB_RESET=1 \
            -e PANTHER_CHROME_BINARY=/usr/local/bin/chrome-for-testing \
            -e PANTHER_CHROME_ARGUMENTS="--headless=new --no-sandbox --disable-dev-shm-usage --disable-gpu" \
            -e HOME=/tmp/panther-home \
            -e XDG_CACHE_HOME=/tmp/panther-cache \
            -e XDG_CONFIG_HOME=/tmp/panther-config \
            -e CHROME_LOG_FILE=/tmp/panther-chrome.log \
            php sh -lc 'mkdir -p "$HOME" "$XDG_CACHE_HOME" "$XDG_CONFIG_HOME" && php vendor/bin/phpunit tests/E2E/LoginPantherTest.php'

      - name: Run merge gate
        run: make test-all

      - name: Collect diagnostics
        if: always()
        run: |
          mkdir -p tmp/ci-artifacts
          docker compose ps > tmp/ci-artifacts/docker-compose-ps.txt || true
          docker compose logs --no-color > tmp/ci-artifacts/docker-compose.log || true
          docker compose exec -T php sh -lc 'find /tmp -maxdepth 3 \( -name "*chrome*" -o -name "*panther*" \) -ls 2>/dev/null' > tmp/ci-artifacts/panther-tmp-files.txt || true
          docker compose cp php:/tmp/panther-chromedriver.log tmp/ci-artifacts/panther-chromedriver.log || true
          docker compose cp php:/tmp/panther-chrome.log tmp/ci-artifacts/panther-chrome.log || true
          docker compose cp php:/tmp/panther-chromium-direct.log tmp/ci-artifacts/panther-chromium-direct.log || true
          docker compose cp php:/tmp/panther-login-failure.html tmp/ci-artifacts/panther-login-failure.html || true
          docker compose cp php:/tmp/panther-login-failure.png tmp/ci-artifacts/panther-login-failure.png || true

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ci-failure-artifacts
          path: |
            tmp/ci-artifacts/
            var/log/test.log
            var/log/test.deprecations.log
            var/panther/
            var/coverage/
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop test services
        if: always()
        run: docker compose down -v --remove-orphans

  deploy:
    name: Deploy production
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
      url: https://estela-exploration.fr
    concurrency:
      group: production-deployment
      cancel-in-progress: false
    env:
      SSH_HOST: ${{ vars.SSH_HOST }}
      SSH_PORT: ${{ vars.SSH_PORT }}
      SSH_USER: ${{ vars.SSH_USER }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
      PHP_BIN: ${{ vars.PHP_BIN }}
      COMPOSER_BIN: ${{ vars.COMPOSER_BIN }}

    steps:
      - name: Checkout exact main commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: ctype, exif, gd, iconv, intl, mbstring, pdo_mysql
          coverage: none
          tools: composer:v2

      - name: Install production Composer dependencies
        run: |
          composer install \
            --no-dev \
            --prefer-dist \
            --no-interaction \
            --no-progress \
            --optimize-autoloader \
            --classmap-authoritative

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Build production assets
        run: |
          npm ci
          npm run build
          test -f public/build/manifest.json

      - name: Validate deployment variables
        shell: bash
        run: |
          set -euo pipefail

          for variable_name in SSH_HOST SSH_PORT SSH_USER DEPLOY_PATH PHP_BIN COMPOSER_BIN; do
            if [[ -z "${!variable_name:-}" ]]; then
              echo "::error::The production variable ${variable_name} is not configured."
              exit 1
            fi
          done

          if [[ ! "$SSH_PORT" =~ ^[0-9]+$ ]]; then
            echo "::error::SSH_PORT must be numeric."
            exit 1
          fi

          if [[ "$DEPLOY_PATH" != /* || "$DEPLOY_PATH" == "/" ]]; then
            echo "::error::DEPLOY_PATH must be an absolute, non-root path."
            exit 1
          fi

      - name: Configure SSH
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          test -n "$SSH_PRIVATE_KEY"
          test -n "$SSH_KNOWN_HOSTS"

          install -d -m 700 "$HOME/.ssh"
          umask 077
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts"

      - name: Test SSH connection
        shell: bash
        run: |
          set -euo pipefail
          printf -v remote_deploy_path '%q' "$DEPLOY_PATH"

          ssh \
            -i "$HOME/.ssh/id_ed25519" \
            -p "$SSH_PORT" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            "$SSH_USER@$SSH_HOST" \
            "test -d $remote_deploy_path"

      - name: Synchronize production files
        shell: bash
        run: |
          set -euo pipefail

          # Excluded paths are protected from transfer and deletion.
          # Never make rsync delete excluded paths: they hold production data.
          rsync \
            --archive \
            --compress \
            --delete-delay \
            --no-owner \
            --no-group \
            --exclude='/.env.local' \
            --exclude='/.env.local.php' \
            --exclude='/.env.*.local' \
            --exclude='/config/secrets/prod/*private.php' \
            --exclude='/config/production/initial-admins.yaml' \
            --exclude='/public/uploads/' \
            --exclude='/var/' \
            --exclude='/.agents/' \
            --exclude='/.codex/' \
            --exclude='/.git/' \
            --exclude='/.github/' \
            --exclude='/node_modules/' \
            --exclude='/tests/' \
            --exclude='/tmp/' \
            --exclude='/.phpunit.cache/' \
            --exclude='/.phpunit.result.cache' \
            --exclude='/coverage/' \
            --exclude='/.dockerignore' \
            --exclude='/.env.docker' \
            --exclude='/docker/' \
            --exclude='/docker-compose*.yml' \
            --exclude='/docker-compose*.yaml' \
            --include='/src/***' \
            --include='/config/***' \
            --include='/templates/***' \
            --include='/migrations/***' \
            --include='/public/***' \
            --include='/vendor/***' \
            --include='/bin/***' \
            --include='/composer.json' \
            --include='/composer.lock' \
            --include='/.env' \
            --exclude='*' \
            -e "ssh -i $HOME/.ssh/id_ed25519 -p $SSH_PORT -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts" \
            ./ \
            "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"

      - name: Finalize production deployment
        shell: bash
        run: |
          set -euo pipefail

          printf -v remote_environment \
            'DEPLOY_PATH=%q PHP_BIN=%q COMPOSER_BIN=%q' \
            "$DEPLOY_PATH" \
            "$PHP_BIN" \
            "$COMPOSER_BIN"

          ssh \
            -i "$HOME/.ssh/id_ed25519" \
            -p "$SSH_PORT" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            "$SSH_USER@$SSH_HOST" \
            "$remote_environment sh -se" <<'REMOTE_SCRIPT'
          set -eu
          cd "$DEPLOY_PATH"

          mkdir -p \
            var/cache/prod \
            var/log \
            public/uploads/avatars \
            public/uploads/media

          "$COMPOSER_BIN" check-platform-reqs --no-dev

          rm -rf var/cache/prod

          "$PHP_BIN" bin/console doctrine:migrations:migrate \
            --env=prod \
            --no-interaction \
            --allow-no-migration

          "$PHP_BIN" bin/console cache:warmup \
            --env=prod \
            --no-debug
          REMOTE_SCRIPT

      - name: Check production website
        run: |
          curl --fail \
            --silent \
            --show-error \
            --retry 3 \
            --retry-delay 5 \
            https://estela-exploration.fr/
