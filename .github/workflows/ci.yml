name: CI

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Configure Docker user
        run: |
          echo "DOCKER_UID=$(id -u)" >> "$GITHUB_ENV"
          echo "DOCKER_GID=$(id -g)" >> "$GITHUB_ENV"
          echo "COMPOSE_FILE=docker-compose.yml:.github/compose.ci.yml" >> "$GITHUB_ENV"

      - name: Start MySQL
        run: docker compose up -d --wait mysql

      - name: Install Composer dependencies
        run: |
          docker compose build php
          docker compose run --rm -e SKIP_COMPOSER_INSTALL=1 php composer install --no-interaction --prefer-dist --no-progress

      - name: Start PHP and Mailpit
        run: docker compose up -d --wait php mailpit

      - name: Install npm dependencies
        run: |
          docker compose run --rm --user root node chown -R "${DOCKER_UID}:${DOCKER_GID}" /var/www/html/node_modules
          docker compose run --rm node npm ci

      - name: Run merge gate
        run: make test-all

      - name: Collect diagnostics
        if: always()
        run: |
          mkdir -p tmp/ci-artifacts
          docker compose ps > tmp/ci-artifacts/docker-compose-ps.txt || true
          docker compose logs --no-color > tmp/ci-artifacts/docker-compose.log || true

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ci-failure-artifacts
          path: |
            tmp/ci-artifacts/
            var/log/test.log
            var/log/test.deprecations.log
            var/panther/
            var/coverage/
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop test services
        if: always()
        run: docker compose down -v --remove-orphans
