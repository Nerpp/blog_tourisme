name: Dependabot policy

run-name: Dependabot policy for PR #${{ github.event.pull_request.number }}

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: dependabot-policy-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  classify:
    name: Classify Dependabot update
    if: >-
      github.event.pull_request.user.login == 'dependabot[bot]' ||
      startsWith(github.event.pull_request.head.ref, 'dependabot/')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
      pull-requests: write
    outputs:
      policyValid: ${{ steps.policy.outputs.policyValid }}
      globalUpdateType: ${{ steps.policy.outputs.globalUpdateType }}
      autoMergeEligible: ${{ steps.policy.outputs.autoMergeEligible }}
      manualReviewRequired: ${{ steps.policy.outputs.manualReviewRequired }}
      maintainerChanges: ${{ steps.policy.outputs.maintainerChanges }}
      reason: ${{ steps.policy.outputs.reason }}

    steps:
      - name: Check out trusted base revision
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Fetch verified Dependabot metadata
        id: dependabot-metadata
        continue-on-error: true
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ github.token }}

      - name: Collect immutable dependency inputs
        id: collect
        uses: actions/github-script@v9
        env:
          ECOSYSTEM: ${{ steps.dependabot-metadata.outputs.package-ecosystem }}
        with:
          script: |
            const fs = require('node:fs');
            const path = require('node:path');
            const pull = context.payload.pull_request;
            const ecosystem = process.env.ECOSYSTEM;
            const changedFiles = await github.paginate(github.rest.pulls.listFiles, {
              ...context.repo,
              pull_number: pull.number,
              per_page: 100,
            });

            const dependencyFiles = {
              composer: ['composer.json', 'composer.lock'],
              npm: ['package.json', 'package-lock.json', 'npm-shrinkwrap.json'],
              npm_and_yarn: ['package.json', 'package-lock.json', 'npm-shrinkwrap.json'],
            }[ecosystem] ?? [];

            const readAtRef = async (file, ref) => {
              try {
                const {data} = await github.rest.repos.getContent({
                  ...context.repo,
                  path: file,
                  ref,
                });
                if (Array.isArray(data) || data.type !== 'file') {
                  throw new Error(`${file} is not a regular file at ${ref}`);
                }
                return Buffer.from(data.content, data.encoding).toString('utf8');
              } catch (error) {
                if (error.status === 404) return null;
                throw error;
              }
            };

            const snapshots = {base: {}, head: {}};
            for (const file of dependencyFiles) {
              snapshots.base[file] = await readAtRef(file, pull.base.sha);
              snapshots.head[file] = await readAtRef(file, pull.head.sha);
            }

            const input = {
              pull: {
                actor: context.actor,
                author: pull.user.login,
                repository: `${context.repo.owner}/${context.repo.repo}`,
                baseRef: pull.base.ref,
                baseRepository: pull.base.repo.full_name,
                baseSha: pull.base.sha,
                headRef: pull.head.ref,
                headRepository: pull.head.repo.full_name,
                headSha: pull.head.sha,
                draft: pull.draft,
                body: pull.body ?? '',
              },
              changedFiles: changedFiles.map((file) => ({
                filename: file.filename,
                status: file.status,
                patch: file.patch ?? null,
              })),
              files: snapshots,
            };
            const inputPath = path.join(process.env.RUNNER_TEMP, 'dependabot-policy-input.json');
            fs.writeFileSync(inputPath, JSON.stringify(input), {encoding: 'utf8', mode: 0o600});
            core.setOutput('input-path', inputPath);

      - name: Compute global dependency level
        id: policy
        env:
          DEPENDENCY_NAMES: ${{ steps.dependabot-metadata.outputs.dependency-names }}
          DEPENDENCY_GROUP: ${{ steps.dependabot-metadata.outputs.dependency-group }}
          DIRECTORY: ${{ steps.dependabot-metadata.outputs.directory }}
          ECOSYSTEM: ${{ steps.dependabot-metadata.outputs.package-ecosystem }}
          MAINTAINER_CHANGES: ${{ steps.dependabot-metadata.outputs.maintainer-changes }}
          METADATA_VERIFIED: ${{ steps.dependabot-metadata.outcome == 'success' }}
          POLICY_INPUT_PATH: ${{ steps.collect.outputs.input-path }}
          TARGET_BRANCH: ${{ steps.dependabot-metadata.outputs.target-branch }}
          UPDATED_DEPENDENCIES_JSON: ${{ steps.dependabot-metadata.outputs.updated-dependencies-json }}
          UPDATE_TYPE: ${{ steps.dependabot-metadata.outputs.update-type }}
        run: node .github/scripts/dependabot-policy.mjs

      - name: Apply the unique level label and assignment
        if: steps.policy.outputs.policyValid == 'true'
        uses: actions/github-script@v9
        env:
          LEVEL: ${{ steps.policy.outputs.globalUpdateType }}
          MAINTAINER_CHANGES: ${{ steps.policy.outputs.maintainerChanges }}
          MANUAL_REVIEW_REQUIRED: ${{ steps.policy.outputs.manualReviewRequired }}
        with:
          script: |
            const allowedLevels = ['patch', 'minor', 'major'];
            const level = process.env.LEVEL;
            if (!allowedLevels.includes(level)) {
              core.setFailed(`Invalid computed dependency level: ${level}`);
              return;
            }
            const issueNumber = context.payload.pull_request.number;
            const {data: issue} = await github.rest.issues.get({
              ...context.repo,
              issue_number: issueNumber,
            });
            const labels = issue.labels
              .map((label) => typeof label === 'string' ? label : label.name)
              .filter((label) => label && !allowedLevels.includes(label));
            labels.push(level);
            await github.rest.issues.setLabels({
              ...context.repo,
              issue_number: issueNumber,
              labels,
            });
            await github.rest.issues.addAssignees({
              ...context.repo,
              issue_number: issueNumber,
              assignees: ['Nerpp'],
            });

            const {data: verified} = await github.rest.issues.get({
              ...context.repo,
              issue_number: issueNumber,
            });
            const verifiedLevels = verified.labels
              .map((label) => typeof label === 'string' ? label : label.name)
              .filter((label) => allowedLevels.includes(label));
            const assignees = verified.assignees.map((assignee) => assignee.login);
            if (verifiedLevels.length !== 1 || verifiedLevels[0] !== level || !assignees.includes('Nerpp')) {
              core.setFailed('The level label or Nerpp assignment could not be verified.');
            }
            if (level === 'minor') {
              core.notice('Minor update: human validation and a manual merge are required.');
            }
            if (level === 'major') {
              core.notice('Major update: breaking-change analysis, migration, human validation, and a manual merge are required.');
            }
            if (process.env.MAINTAINER_CHANGES === 'true') {
              core.notice('Maintainer or publisher change: human validation and a manual merge are required.');
            }

      - name: Publish policy summary
        env:
          ELIGIBLE: ${{ steps.policy.outputs.autoMergeEligible }}
          LEVEL: ${{ steps.policy.outputs.globalUpdateType }}
          MAINTAINER_CHANGES: ${{ steps.policy.outputs.maintainerChanges }}
          MANUAL_REVIEW_REQUIRED: ${{ steps.policy.outputs.manualReviewRequired }}
          POLICY_VALID: ${{ steps.policy.outputs.policyValid }}
          REASON: ${{ steps.policy.outputs.reason }}
          SUMMARY: ${{ steps.policy.outputs.dependency-summary }}
        run: |
          {
            echo '### Dependabot policy classification'
            printf -- "- Policy valid: \`%s\`\n" "$POLICY_VALID"
            printf -- "- Global level: \`%s\`\n" "$LEVEL"
            printf -- "- Automatic merge eligible: \`%s\`\n" "$ELIGIBLE"
            printf -- "- Manual review required: \`%s\`\n" "$MANUAL_REVIEW_REQUIRED"
            printf -- "- Maintainer/publisher changes: \`%s\`\n" "$MAINTAINER_CHANGES"
            printf -- '- Reason: %s\n' "$REASON"
            printf -- '- Dependencies: %s\n' "$SUMMARY"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Validate classification policy
        env:
          POLICY_VALID: ${{ steps.policy.outputs.policyValid }}
        run: test "$POLICY_VALID" = 'true'

  auto-merge:
    name: Merge eligible Dependabot patch
    needs:
      - classify
    if: >-
      needs.classify.result == 'success' &&
      needs.classify.outputs.policyValid == 'true' &&
      needs.classify.outputs.globalUpdateType == 'patch' &&
      needs.classify.outputs.autoMergeEligible == 'true' &&
      needs.classify.outputs.manualReviewRequired == 'false' &&
      needs.classify.outputs.maintainerChanges == 'false' &&
      vars.DEPENDABOT_AUTOMERGE_ENABLED == 'true' &&
      github.actor == 'dependabot[bot]' &&
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      startsWith(github.event.pull_request.head.ref, 'dependabot/') &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.base.ref == 'dev' &&
      github.event.pull_request.base.repo.full_name == github.repository &&
      github.event.pull_request.state == 'open' &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      checks: read
      contents: read
      pull-requests: read

    steps:
      - name: Check out trusted base revision
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Verify immutable PR identity and effective dev rules
        id: immutable
        uses: actions/github-script@v9
        env:
          EXPECTED_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          retries: 3
          script: |
            const pull = context.payload.pull_request;
            const repository = `${context.repo.owner}/${context.repo.repo}`;
            if (pull.head.sha !== process.env.EXPECTED_HEAD_SHA
                || pull.user.login !== 'dependabot[bot]'
                || pull.state !== 'open'
                || pull.base.ref !== 'dev'
                || pull.base.repo.full_name !== repository
                || pull.head.repo.full_name !== repository
                || !pull.head.ref.startsWith('dependabot/')
                || pull.draft) {
              core.setFailed('The immutable Dependabot PR identity is no longer valid.');
              return;
            }

            const {data: rules} = await github.request('GET /repos/{owner}/{repo}/rules/branches/{branch}', {
              ...context.repo,
              branch: 'dev',
            });
            const pullRules = rules.filter((rule) => rule.type === 'pull_request');
            const requiredContexts = rules
              .filter((rule) => rule.type === 'required_status_checks')
              .flatMap((rule) => rule.parameters.required_status_checks.map((check) => check.context));
            const mergeOnly = pullRules.length === 1
              && pullRules[0].parameters.required_review_thread_resolution === true
              && pullRules[0].parameters.allowed_merge_methods.length === 1
              && pullRules[0].parameters.allowed_merge_methods[0] === 'merge';
            if (!mergeOnly || requiredContexts.length !== 1 || requiredContexts[0] !== 'Quality') {
              core.setFailed('The effective dev rules must require only Quality and allow only merge commits.');
              return;
            }

            let current;
            for (let attempt = 0; attempt < 5; attempt += 1) {
              ({data: current} = await github.rest.pulls.get({
                ...context.repo,
                pull_number: pull.number,
              }));
              if (current.mergeable !== null) break;
              await new Promise((resolve) => setTimeout(resolve, 2000));
            }
            if (current.head.sha !== process.env.EXPECTED_HEAD_SHA
                || current.mergeable !== true
                || current.mergeable_state === 'dirty') {
              core.setFailed(`PR changed, conflicts, or has ambiguous mergeability (${current.mergeable_state}).`);
              return;
            }

            let qualityConclusion = 'missing';
            let qualityHeadSha = '';
            for (let attempt = 0; attempt < 45; attempt += 1) {
              const {data: checks} = await github.rest.checks.listForRef({
                ...context.repo,
                ref: process.env.EXPECTED_HEAD_SHA,
                per_page: 100,
              });
              const quality = checks.check_runs
                .filter((check) => check.name === 'Quality')
                .sort((left, right) => right.id - left.id)[0];
              if (quality?.status === 'completed') {
                qualityConclusion = quality.conclusion ?? 'unknown';
                qualityHeadSha = quality.head_sha ?? '';
                break;
              }
              await new Promise((resolve) => setTimeout(resolve, 10000));
            }
            const {data: latest} = await github.rest.pulls.get({
              ...context.repo,
              pull_number: pull.number,
            });
            core.setOutput('current-head-sha', latest.head.sha);
            core.setOutput('quality-conclusion', qualityConclusion);
            core.setOutput('quality-head-sha', qualityHeadSha);
            if (latest.head.sha !== process.env.EXPECTED_HEAD_SHA) {
              core.notice('Automatic merge stays inactive because the PR head changed while waiting for Quality.');
            }
            if (qualityConclusion !== 'success') {
              core.notice(`Automatic merge stays inactive because Quality is ${qualityConclusion}.`);
            }
            if (qualityHeadSha !== process.env.EXPECTED_HEAD_SHA) {
              core.notice('Automatic merge stays inactive because Quality does not target the expected PR SHA.');
            }

      - name: Evaluate activation, credentials, Quality, and SHA gates
        id: auto-merge-gate
        env:
          ACTIVATION_VALUE: ${{ vars.DEPENDABOT_AUTOMERGE_ENABLED }}
          AUTO_MERGE_ELIGIBLE: ${{ needs.classify.outputs.autoMergeEligible }}
          CURRENT_HEAD_SHA: ${{ steps.immutable.outputs.current-head-sha }}
          EXPECTED_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GLOBAL_UPDATE_TYPE: ${{ needs.classify.outputs.globalUpdateType }}
          GITHUB_APP_ID: ${{ secrets.PROMOTION_GITHUB_APP_ID }}
          GITHUB_APP_PRIVATE_KEY: ${{ secrets.PROMOTION_GITHUB_APP_PRIVATE_KEY }}
          MAINTAINER_CHANGES: ${{ needs.classify.outputs.maintainerChanges }}
          MANUAL_REVIEW_REQUIRED: ${{ needs.classify.outputs.manualReviewRequired }}
          POLICY_VALID: ${{ needs.classify.outputs.policyValid }}
          QUALITY_CONCLUSION: ${{ steps.immutable.outputs.quality-conclusion }}
          QUALITY_HEAD_SHA: ${{ steps.immutable.outputs.quality-head-sha }}
        run: node .github/scripts/dependabot-policy.mjs --auto-merge-gate

      - name: Create least-privilege GitHub App token
        if: steps.auto-merge-gate.outputs.auto-merge-allowed == 'true'
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.PROMOTION_GITHUB_APP_ID }}
          private-key: ${{ secrets.PROMOTION_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: blog_tourisme

      - name: Merge eligible Dependabot patch safely
        if: steps.auto-merge-gate.outputs.auto-merge-allowed == 'true'
        uses: actions/github-script@v9
        env:
          EXPECTED_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const expectedHeadSha = process.env.EXPECTED_HEAD_SHA;
            const repository = `${context.repo.owner}/${context.repo.repo}`;
            const pullNumber = context.payload.pull_request.number;
            let pull;

            for (let attempt = 0; attempt < 5; attempt += 1) {
              ({data: pull} = await github.rest.pulls.get({
                ...context.repo,
                pull_number: pullNumber,
              }));
              if (pull.state !== 'open'
                  || pull.draft
                  || pull.user.login !== 'dependabot[bot]'
                  || pull.base.ref !== 'dev'
                  || pull.base.repo.full_name !== repository
                  || !pull.head.ref.startsWith('dependabot/')
                  || pull.head.repo.full_name !== repository
                  || pull.head.sha !== expectedHeadSha) {
                core.setFailed('The Dependabot PR identity or SHA changed after validation.');
                return;
              }

              const mergeabilityState = pull.mergeable_state ?? 'unknown';
              if (pull.mergeable !== null && mergeabilityState !== 'unknown') break;
              if (attempt < 4) await new Promise((resolve) => setTimeout(resolve, 2000));
            }

            const mergeabilityState = pull.mergeable_state ?? 'unknown';
            if (pull.mergeable !== true || !['clean', 'blocked'].includes(mergeabilityState)) {
              core.setFailed(`Dependabot PR mergeability is not safe (${mergeabilityState}).`);
              return;
            }
            if (pull.auto_merge) {
              core.notice('Auto-merge is already enabled.');
              return;
            }

            if (mergeabilityState === 'clean') {
              const {data: mergeResult} = await github.rest.pulls.merge({
                ...context.repo,
                pull_number: pull.number,
                merge_method: 'merge',
                sha: expectedHeadSha,
              });
              if (mergeResult.merged !== true || !/^[0-9a-f]{40}$/.test(mergeResult.sha ?? '')) {
                core.setFailed('GitHub did not confirm the Dependabot merge or return a merge commit SHA.');
                return;
              }

              const {data: mergedPull} = await github.rest.pulls.get({
                ...context.repo,
                pull_number: pull.number,
              });
              if (mergedPull.merged !== true
                  || !mergedPull.merge_commit_sha
                  || mergedPull.merge_commit_sha !== mergeResult.sha) {
                core.setFailed('The merged Dependabot PR did not confirm the expected merge commit SHA.');
                return;
              }
              core.notice(`Dependabot PR #${pull.number} merged as ${mergeResult.sha}.`);
              return;
            }

            const autoMergeResult = await github.graphql(
              `mutation($pullRequestId: ID!) {
                enablePullRequestAutoMerge(input: {pullRequestId: $pullRequestId, mergeMethod: MERGE}) {
                  pullRequest { number }
                }
              }`,
              {pullRequestId: pull.node_id},
            );
            if (autoMergeResult?.enablePullRequestAutoMerge?.pullRequest?.number !== pull.number) {
              core.setFailed('GitHub did not confirm the Dependabot auto-merge request.');
              return;
            }
            core.notice(`Auto-merge enabled on blocked Dependabot PR #${pull.number}.`);
