name: Dependabot policy

run-name: Dependabot policy for PR #${{ github.event.pull_request.number }}

on:
  pull_request_target:
    branches:
      - dev
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: dependabot-policy-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  classify:
    name: Classify Dependabot update
    if: >-
      github.actor == 'dependabot[bot]' &&
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.event.pull_request.base.ref == 'dev' &&
      startsWith(github.event.pull_request.head.ref, 'dependabot/') &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
      pull-requests: write
    outputs:
      semver-level: ${{ steps.policy.outputs.semver-level }}
      auto-merge-eligible: ${{ steps.policy.outputs.auto-merge-eligible }}
      policy-valid: ${{ steps.policy.outputs.policy-valid }}

    steps:
      - name: Check out trusted base revision
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Fetch verified Dependabot metadata
        id: dependabot-metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ github.token }}

      - name: Collect immutable dependency inputs
        id: collect
        uses: actions/github-script@v9
        env:
          ECOSYSTEM: ${{ steps.dependabot-metadata.outputs.package-ecosystem }}
        with:
          script: |
            const fs = require('node:fs');
            const path = require('node:path');
            const pull = context.payload.pull_request;
            const ecosystem = process.env.ECOSYSTEM;
            const changedFiles = await github.paginate(github.rest.pulls.listFiles, {
              ...context.repo,
              pull_number: pull.number,
              per_page: 100,
            });

            const dependencyFiles = {
              composer: ['composer.json', 'composer.lock'],
              npm: ['package.json', 'package-lock.json', 'npm-shrinkwrap.json'],
              npm_and_yarn: ['package.json', 'package-lock.json', 'npm-shrinkwrap.json'],
            }[ecosystem] ?? [];

            const readAtRef = async (file, ref) => {
              try {
                const {data} = await github.rest.repos.getContent({
                  ...context.repo,
                  path: file,
                  ref,
                });
                if (Array.isArray(data) || data.type !== 'file') {
                  throw new Error(`${file} is not a regular file at ${ref}`);
                }
                return Buffer.from(data.content, data.encoding).toString('utf8');
              } catch (error) {
                if (error.status === 404) return null;
                throw error;
              }
            };

            const snapshots = {base: {}, head: {}};
            for (const file of dependencyFiles) {
              snapshots.base[file] = await readAtRef(file, pull.base.sha);
              snapshots.head[file] = await readAtRef(file, pull.head.sha);
            }

            const input = {
              pull: {
                actor: context.actor,
                author: pull.user.login,
                repository: `${context.repo.owner}/${context.repo.repo}`,
                baseRef: pull.base.ref,
                baseRepository: pull.base.repo.full_name,
                headRef: pull.head.ref,
                headRepository: pull.head.repo.full_name,
                draft: pull.draft,
              },
              changedFiles: changedFiles.map((file) => ({
                filename: file.filename,
                status: file.status,
                patch: file.patch ?? null,
              })),
              files: snapshots,
            };
            const inputPath = path.join(process.env.RUNNER_TEMP, 'dependabot-policy-input.json');
            fs.writeFileSync(inputPath, JSON.stringify(input), {encoding: 'utf8', mode: 0o600});
            core.setOutput('input-path', inputPath);

      - name: Compute global dependency level
        id: policy
        env:
          DEPENDENCY_NAMES: ${{ steps.dependabot-metadata.outputs.dependency-names }}
          DIRECTORY: ${{ steps.dependabot-metadata.outputs.directory }}
          ECOSYSTEM: ${{ steps.dependabot-metadata.outputs.package-ecosystem }}
          MAINTAINER_CHANGES: ${{ steps.dependabot-metadata.outputs.maintainer-changes }}
          POLICY_INPUT_PATH: ${{ steps.collect.outputs.input-path }}
          TARGET_BRANCH: ${{ steps.dependabot-metadata.outputs.target-branch }}
          UPDATED_DEPENDENCIES_JSON: ${{ steps.dependabot-metadata.outputs.updated-dependencies-json }}
          UPDATE_TYPE: ${{ steps.dependabot-metadata.outputs.update-type }}
        run: node .github/scripts/dependabot-policy.mjs

      - name: Apply the unique level label and assignment
        uses: actions/github-script@v9
        env:
          LEVEL: ${{ steps.policy.outputs.semver-level }}
        with:
          script: |
            const allowedLevels = ['patch', 'minor', 'major'];
            const level = process.env.LEVEL;
            if (!allowedLevels.includes(level)) {
              core.setFailed(`Invalid computed dependency level: ${level}`);
              return;
            }
            const issueNumber = context.payload.pull_request.number;
            const {data: issue} = await github.rest.issues.get({
              ...context.repo,
              issue_number: issueNumber,
            });
            const labels = issue.labels
              .map((label) => typeof label === 'string' ? label : label.name)
              .filter((label) => label && !allowedLevels.includes(label));
            labels.push(level);
            await github.rest.issues.setLabels({
              ...context.repo,
              issue_number: issueNumber,
              labels,
            });
            await github.rest.issues.addAssignees({
              ...context.repo,
              issue_number: issueNumber,
              assignees: ['Nerpp'],
            });

            const {data: verified} = await github.rest.issues.get({
              ...context.repo,
              issue_number: issueNumber,
            });
            const verifiedLevels = verified.labels
              .map((label) => typeof label === 'string' ? label : label.name)
              .filter((label) => allowedLevels.includes(label));
            const assignees = verified.assignees.map((assignee) => assignee.login);
            if (verifiedLevels.length !== 1 || verifiedLevels[0] !== level || !assignees.includes('Nerpp')) {
              core.setFailed('The level label or Nerpp assignment could not be verified.');
            }
            if (level === 'minor') {
              core.notice('Minor update: human validation and a manual merge are required.');
            }
            if (level === 'major') {
              core.notice('Major update: breaking-change analysis, migration, human validation, and a manual merge are required.');
            }

      - name: Publish policy summary
        env:
          ELIGIBLE: ${{ steps.policy.outputs.auto-merge-eligible }}
          LEVEL: ${{ steps.policy.outputs.semver-level }}
          REASON: ${{ steps.policy.outputs.reason }}
          SUMMARY: ${{ steps.policy.outputs.dependency-summary }}
        run: |
          {
            echo '### Dependabot policy classification'
            printf -- "- Global level: \`%s\`\n" "$LEVEL"
            printf -- "- Future auto-merge eligible: \`%s\`\n" "$ELIGIBLE"
            printf -- '- Reason: %s\n' "$REASON"
            printf -- '- Dependencies: %s\n' "$SUMMARY"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Validate classification policy
        env:
          POLICY_VALID: ${{ steps.policy.outputs.policy-valid }}
        run: test "$POLICY_VALID" = 'true'

  auto-merge:
    name: Request patch auto-merge
    needs:
      - classify
    if: >-
      needs.classify.result == 'success' &&
      needs.classify.outputs.policy-valid == 'true' &&
      needs.classify.outputs.semver-level == 'patch' &&
      needs.classify.outputs.auto-merge-eligible == 'true' &&
      vars.DEPENDABOT_AUTOMERGE_ENABLED == 'true' &&
      github.actor == 'dependabot[bot]' &&
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.event.pull_request.base.ref == 'dev' &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Verify immutable PR identity and effective dev rules
        uses: actions/github-script@v9
        env:
          EXPECTED_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          retries: 3
          script: |
            const pull = context.payload.pull_request;
            const repository = `${context.repo.owner}/${context.repo.repo}`;
            if (pull.head.sha !== process.env.EXPECTED_HEAD_SHA
                || pull.user.login !== 'dependabot[bot]'
                || pull.base.ref !== 'dev'
                || pull.base.repo.full_name !== repository
                || pull.head.repo.full_name !== repository
                || !pull.head.ref.startsWith('dependabot/')
                || pull.draft) {
              core.setFailed('The immutable Dependabot PR identity is no longer valid.');
              return;
            }

            const {data: rules} = await github.request('GET /repos/{owner}/{repo}/rules/branches/{branch}', {
              ...context.repo,
              branch: 'dev',
            });
            const pullRules = rules.filter((rule) => rule.type === 'pull_request');
            const requiredContexts = rules
              .filter((rule) => rule.type === 'required_status_checks')
              .flatMap((rule) => rule.parameters.required_status_checks.map((check) => check.context));
            const mergeOnly = pullRules.length === 1
              && pullRules[0].parameters.required_review_thread_resolution === true
              && pullRules[0].parameters.allowed_merge_methods.length === 1
              && pullRules[0].parameters.allowed_merge_methods[0] === 'merge';
            if (!mergeOnly || requiredContexts.length !== 1 || requiredContexts[0] !== 'Quality') {
              core.setFailed('The effective dev rules must require only Quality and allow only merge commits.');
              return;
            }

            let current;
            for (let attempt = 0; attempt < 5; attempt += 1) {
              ({data: current} = await github.rest.pulls.get({
                ...context.repo,
                pull_number: pull.number,
              }));
              if (current.mergeable !== null) break;
              await new Promise((resolve) => setTimeout(resolve, 2000));
            }
            if (current.head.sha !== process.env.EXPECTED_HEAD_SHA
                || current.mergeable !== true
                || current.mergeable_state === 'dirty') {
              core.setFailed(`PR changed, conflicts, or has ambiguous mergeability (${current.mergeable_state}).`);
            }

      - name: Create least-privilege GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.PROMOTION_GITHUB_APP_ID }}
          private-key: ${{ secrets.PROMOTION_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: blog_tourisme

      - name: Request merge-commit auto-merge
        uses: actions/github-script@v9
        env:
          EXPECTED_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const {data: pull} = await github.rest.pulls.get({
              ...context.repo,
              pull_number: context.payload.pull_request.number,
            });
            if (pull.head.sha !== process.env.EXPECTED_HEAD_SHA
                || pull.base.ref !== 'dev'
                || pull.user.login !== 'dependabot[bot]') {
              core.setFailed('The PR changed after policy validation.');
              return;
            }
            if (pull.auto_merge) {
              core.notice('Auto-merge is already enabled.');
              return;
            }
            await github.graphql(
              `mutation($pullRequestId: ID!) {
                enablePullRequestAutoMerge(input: {pullRequestId: $pullRequestId, mergeMethod: MERGE}) {
                  pullRequest { number }
                }
              }`,
              {pullRequestId: pull.node_id},
            );
