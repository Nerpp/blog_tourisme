services:
  php:
    environment:
      CI: "true"
      PANTHER_CHROME_ARGUMENTS: --headless=new --no-sandbox --disable-dev-shm-usage --disable-gpu
      PANTHER_CHROME_BINARY: /usr/bin/chromium
      HOME: /tmp/panther-home
      XDG_CACHE_HOME: /tmp/panther-cache
      XDG_CONFIG_HOME: /tmp/panther-config

  node:
    environment:
      HOME: /tmp
      NPM_CONFIG_CACHE: /tmp/npm-cache
    volumes:
      - node_modules_ci:/var/www/html/node_modules

volumes:
  node_modules_ci:
