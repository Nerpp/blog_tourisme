version: 2

updates:
  # Dépendances PHP : Symfony, Doctrine, PHPUnit, etc.
  - package-ecosystem: "composer"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 3
    groups:
      symfony-patches:
        patterns:
          - "symfony/*"
        update-types:
          - "patch"
      doctrine-patches:
        patterns:
          - "doctrine/*"
        update-types:
          - "patch"

  # Dépendances JavaScript : Vite, Leaflet, plugins, etc.
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:15"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 2

  # Image de base du Dockerfile.
  - package-ecosystem: "docker"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:30"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 1
