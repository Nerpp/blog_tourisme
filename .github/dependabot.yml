version: 2

updates:
  # Dépendances PHP : Symfony, Doctrine, PHPUnit, etc.
  - package-ecosystem: "composer"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 10
    assignees:
      - "Nerpp"
    labels:
      - "dependencies"
      - "php"
    groups:
      composer-patches:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "patch"
      composer-minors:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "minor"

  # Dépendances JavaScript : Vite, Leaflet, plugins, etc.
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:15"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 10
    assignees:
      - "Nerpp"
    labels:
      - "dependencies"
      - "javascript"
    groups:
      npm-patches:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "patch"
      npm-minors:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "minor"

  # Image PHP définie dans le Dockerfile racine.
  - package-ecosystem: "docker"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:30"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    assignees:
      - "Nerpp"
    labels:
      - "dependencies"
    groups:
      docker-patches:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "patch"
      docker-minors:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "minor"

  # Actions GitHub utilisées par la CI.
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "07:45"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    assignees:
      - "Nerpp"
    labels:
      - "dependencies"
      - "github_actions"
    groups:
      github-actions-patches:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "patch"
      github-actions-minors:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "minor"
