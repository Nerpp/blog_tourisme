version: 2

updates:
  # Dépendances PHP : Symfony, Doctrine, PHPUnit, etc.
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 3
    groups:
      symfony-patches:
        patterns:
          - "symfony/*"
        update-types:
          - "patch"
      doctrine-patches:
        patterns:
          - "doctrine/*"
        update-types:
          - "patch"

  # Dépendances JavaScript : Vite, Leaflet, plugins, etc.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:15"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 2

  # Image PHP définie dans le Dockerfile racine.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:30"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 1

  # Actions GitHub utilisées par la CI.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "07:45"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 2
