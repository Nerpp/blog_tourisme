version: 2

updates:
  # Dépendances PHP : Symfony, Doctrine, PHPUnit, etc.
  - package-ecosystem: "composer"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 3
    allow:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-patch"
      - dependency-name: "symfony/*"
        update-types:
          - "version-update:semver-minor"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    groups:
      symfony-updates:
        applies-to: "version-updates"
        patterns:
          - "symfony/*"
        update-types:
          - "patch"
          - "minor"
      doctrine-patches:
        applies-to: "version-updates"
        patterns:
          - "doctrine/*"
        update-types:
          - "patch"
      composer-patches:
        applies-to: "version-updates"
        patterns:
          - "*"
        exclude-patterns:
          - "symfony/*"
          - "doctrine/*"
        update-types:
          - "patch"

  # Dépendances JavaScript : Vite, Leaflet, plugins, etc.
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:15"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 2
    allow:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-major"
    groups:
      npm-patches:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "patch"

  # Image PHP définie dans le Dockerfile racine.
  - package-ecosystem: "docker"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:30"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 1
    allow:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-patch"
          - "version-update:semver-minor"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    groups:
      docker-patches:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "patch"

  # Actions GitHub utilisées par la CI.
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "07:45"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 2
    allow:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-major"
    groups:
      github-actions-patches:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "patch"
