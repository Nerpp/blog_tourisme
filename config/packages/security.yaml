security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js|build)/
            security: false

        main:
            lazy: true
            provider: app_user_provider
            access_denied_handler: App\Security\AdminAccessDeniedHandler
            user_checker: App\Security\BannedUserChecker
            custom_authenticators:
                - App\Security\GoogleAuthenticator
            login_throttling:
                max_attempts: 5
                interval: '15 minutes'
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
            logout:
                path: app_logout
                target: app_home
                enable_csrf: true
                csrf_parameter: _csrf_token
                csrf_token_id: logout

    access_control:
        - { path: ^/admin, roles: ADMIN_ACCESS }
        - { path: ^/profile, roles: ROLE_USER }
        - { path: ^/comments, roles: ROLE_USER }
