framework:
    secret: '%env(APP_SECRET)%'
    csrf_protection: true
    form: true
    validation:
        email_validation_mode: html5
    http_method_override: false
    handle_all_throwables: true

    session:
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax

    php_errors:
        log: true

    router:
        utf8: true

    rate_limiter:
        comment_create:
            policy: sliding_window
            limit: 6
            interval: '15 minutes'
        comment_report:
            policy: sliding_window
            limit: 10
            interval: '15 minutes'
        admin_upload:
            policy: token_bucket
            limit: 30
            rate:
                interval: '1 minute'
                amount: 10
        password_reset:
            policy: sliding_window
            limit: 5
            interval: '15 minutes'

    mailer:
        dsn: '%env(MAILER_DSN)%'
