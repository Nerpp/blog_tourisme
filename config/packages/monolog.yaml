monolog:
    channels: [deprecation]

    handlers:
        main:
            type: stream
            path: '%kernel.logs_dir%/%kernel.environment%.log'
            level: debug
            channels: ['!event', '!deprecation']

        console:
            type: console
            process_psr_3_messages: false
            channels: ['!event', '!doctrine', '!console', '!deprecation']

        deprecation:
            type: stream
            path: '%kernel.logs_dir%/%kernel.environment%.deprecations.log'
            channels: [deprecation]

when@test:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                channels: ['!event', '!deprecation']

            nested:
                type: stream
                path: '%kernel.logs_dir%/%kernel.environment%.log'
                level: debug

when@prod:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: grouped
                excluded_http_codes: [404, 405]
                buffer_size: 50
                channels: ['!event', '!deprecation']

            grouped:
                type: group
                members: [nested, deduplicated]

            deduplicated:
                type: deduplication
                handler: mailer
                time: 60

            mailer:
                type: symfony_mailer
                from_email: '%env(MONOLOG_FROM_EMAIL)%'
                to_email: '%env(MONOLOG_TO_EMAIL)%'
                subject: '[Blog Tourisme] %%level_name%% - %%message%%'
                level: error
                formatter: monolog.formatter.html
                content_type: text/html

            nested:
                type: stream
                path: '%kernel.logs_dir%/%kernel.environment%.log'
                level: debug

            console:
                type: console
                process_psr_3_messages: false
                channels: ['!event', '!doctrine', '!console', '!deprecation']
